<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu blog de viagens</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #ccc;
        }

        header {
            background-color: #2c5d63;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .content {
            padding: 20px;
        }

        .post-image {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        h2 {
            color: #2c5d63;
        }

        .author {
            margin: 10px 0;
            font-style: italic;
        }

        .botoes {
            margin-top: 20px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Meu blog de viagens</h1>
        <p>Explorando o mundo e compartilhando experiências incríveis</p>
    </header>

    <div class="content">

        <img 
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
            class="post-image"
        >

        <h2>Minha primeira viagem</h2>

        <p class="author">Por: Arthur Ferraro urban</p>

        <p>
            Viajar é uma das experiências mais enriquecedoras...
        </p>

        <!-- BOTÕES -->
        <div class="botoes">
            <button id="like">👍 Like (<span id="likeCount">0</span>)</button>
            <button id="dislike">👎 Dislike (<span id="dislikeCount">0</span>)</button>
        </div>

    </div>
</div>

<script>
    const artigos = document.querySelectorAll("article");

    artigos.forEach(function (artigo) {
        const botoes = artigo.querySelectorAll("button");

        const likeBtn = botoes[0];
        const dislikeBtn = botoes[1];

        const likeSpan = likeBtn.querySelector("span");
        const dislikeSpan = dislikeBtn.querySelector("span");

        let curtiu = false;
        let descurtiu = false;

        likeBtn.addEventListener("click", function () {
            if (!curtiu) {
                likeSpan.textContent++;
                curtiu = true;

                if (descurtiu) {
                    dislikeSpan.textContent--;
                    descurtiu = false;
                }
            } else {
                likeSpan.textContent--;
                curtiu = false;
            }
        });

        dislikeBtn.addEventListener("click", function () {
            if (!descurtiu) {
                dislikeSpan.textContent++;
                descurtiu = true;

                if (curtiu) {
                    likeSpan.textContent--;
                    curtiu = false;
                }
            } else {
                dislikeSpan.textContent--;
                descurtiu = false;
            }
        });
    });
</script>

</body>
</html>
